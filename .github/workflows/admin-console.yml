name: admin-console

on:
  push:
    branches: [main]
    paths:
      - "apps/admin-console/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/admin-console/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Admin Console Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin-console/package-lock.json

      - name: npm ci
        working-directory: apps/admin-console
        run: npm ci

      - name: typecheck
        working-directory: apps/admin-console
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: build
        working-directory: apps/admin-console
        run: npm run build
