name: release-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gaokao_agent_test
        ports:
          - 54329:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: control-plane/go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin-console/package-lock.json

      - name: install python deps
        run: pip install ruff mypy "psycopg[binary]" pyyaml certifi

      - name: install admin-console deps
        working-directory: apps/admin-console
        run: npm ci --legacy-peer-deps

      - name: migrate db
        run: |
          DATABASE_URL_ADMIN=postgresql://postgres:postgres@localhost:54329/gaokao_agent_test \
            python3 services/db-policy-service/scripts/migrate.py --fixtures
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: sync db index
        run: |
          DATABASE_URL_ADMIN=postgresql://postgres:postgres@localhost:54329/gaokao_agent_test \
            python3 services/db-policy-service/scripts/sync_index_to_db.py --root . || true
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── Route & freeze gates ──
      - name: test-route-contract
        run: python3 tools/check_route_contract.py --root .

      - name: test-python-control-plane-freeze
        run: python3 tools/check_python_control_plane_freeze.py --root .

      - name: test-gateway-freeze
        run: python3 tools/check_gateway_freeze.py --root . --allow-existing

      - name: test-package-boundary
        run: python3 tools/check_package_boundary.py --root . --allowlist contracts/package_boundary_allowlist.json

      # ── Service ownership ──
      - name: service-ownership-check
        run: python3 tools/check_service_ownership.py --root . --allow-tbd
        # TODO: remove --allow-tbd once code_owner and security_reviewer fields are assigned

      # ── CI policy ──
      - name: ci-policy-check
        run: GAOKAO_ENV=production RAG_SOURCE=postgres python3 tools/ci_policy_check.py --root .

      - name: ci-policy-check-json-denied
        run: "! GAOKAO_ENV=production RAG_SOURCE=json python3 tools/ci_policy_check.py --root ."

      # ── DB policy live ──
      - name: test-db-policy-live
        run: |
          DATABASE_URL_ADMIN=postgresql://postgres:postgres@localhost:54329/gaokao_agent_test \
          DATABASE_URL_PUBLIC=postgresql://gaokao_api_public:postgres@localhost:54329/gaokao_agent_test \
          DATABASE_URL_STAFF=postgresql://gaokao_api_staff:postgres@localhost:54329/gaokao_agent_test \
          DATABASE_URL_ADMIN_APP=postgresql://postgres:postgres@localhost:54329/gaokao_agent_test \
          python3 services/db-policy-service/tests/run_db_policy_tests.py --live
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── Campus modules ──
      - name: test-campus-auth
        run: python -m unittest discover -s services/auth-service/tests -p '*test.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: test-wecom-adapter
        run: python -m unittest discover -s services/wecom-adapter/tests -p '*test.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: test-campus-flow
        run: python -m unittest discover -s services/api-gateway/tests -p 'campus_gateway_test.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: test-wecom-inbound
        run: |
          python -m unittest discover -s services/mealbot-service/tests -p 'test_sprint5_wecom_inbound.py' -v
          python -m unittest discover -s services/mealbot-service/tests -p 'message_adapters_test.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:54329/gaokao_agent_test

      - name: test-campus-new-modules
        run: python -m unittest discover -s services/mealbot-service/tests -p 'test_campus_new_modules.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:54329/gaokao_agent_test

      - name: test-release-hardening
        run: |
          python -m unittest discover -s services/evaluation-service/tests -p 'release_gate_check_test.py' -v
          python -m unittest discover -s services/mealbot-service/tests -p 'test_sprint6_release_hardening.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:54329/gaokao_agent_test

      - name: test-pilot-package
        run: python -m unittest discover -s services/mealbot-service/tests -p 'test_sprint7_pilot_package.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:54329/gaokao_agent_test

      # ── Core services ──
      - name: test-core-services
        run: |
          python -m unittest discover -s services/api-gateway/tests -p '*_test.py' -v
          python -m unittest discover -s services/crm-service/tests -p '*_test.py' -v
          python -m unittest discover -s services/llm-gateway/tests -p 'contract_test.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: test-ingestion
        run: python -m unittest discover -s services/source-ingestion-service/tests -p '*test*.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: test-graph
        run: python -m unittest discover -s services/knowledge-graph-service/tests -p '*test*.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: test-admin-gateway
        run: python -m unittest discover -s services/api-gateway/tests -p 'admin_gateway_test.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: test-admin-roles
        run: python -m unittest discover -s services/api-gateway/tests -p 'admin_role_granularity_test.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── Phase 3 ──
      - name: test-phase3
        run: |
          python -m unittest discover -s services/crm-service/tests -p 'profile_test.py' -v
          python -m unittest discover -s services/crm-service/tests -p 'profile_merge_policy_test.py' -v
          python -m unittest discover -s services/agent-orchestrator/tests -p 'consultation_stage_test.py' -v
          python -m unittest discover -s services/agent-orchestrator/tests -p 'bt_fsm_test.py' -v
          python -m unittest discover -s services/recommendation-service/tests -p '*test*.py' -v
          python -m unittest discover -s services/agent-orchestrator/tests -p 'admissions_answer_policy_test.py' -v
          python -m unittest discover -s services/crm-service/tests -p 'lead_profile_sync_test.py' -v
          python -m unittest discover -s services/crm-service/tests -p 'next_best_action_test.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── Security ──
      - name: test-security
        run: |
          python -m unittest discover -s tests/security -p 'test_prompt_injection_extended.py' -v
          python -m unittest discover -s services/api-gateway/tests -p 'admin_security_regression_test.py' -v
          python -m unittest discover -s services/source-ingestion-service/tests -p 'security_regression_test.py' -v
          python -m unittest discover -s tests/security -p 'test_p4_security.py' -v
          python -m unittest discover -s tests/security -p 'test_health_check.py' -v
          python -m unittest discover -s tests/security -p 'test_audit_query.py' -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── Go control plane ──
      - name: go vet
        working-directory: control-plane
        run: go vet ./...

      - name: go test
        working-directory: control-plane
        run: go test ./... -count=1 -timeout 120s

      - name: go test -race
        working-directory: control-plane
        run: go test -race ./... -count=1 -timeout 300s

      # ── Admin console ──
      - name: admin-console typecheck
        working-directory: apps/admin-console
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: admin-console build
        working-directory: apps/admin-console
        run: npm run build

      # ── Lint (baseline-gated) ──
      - name: python lint (ruff baseline)
        run: python tools/check_lint_baseline.py --tool ruff

      - name: python typecheck (mypy baseline)
        run: python tools/check_lint_baseline.py --tool mypy

      - name: baseline-integrity-check
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          python tools/check_baseline_integrity.py --root . --base-ref origin/main
        # TODO: add --strict after schema v1 baselines land on main (second commit)

      # ── Knowledge base ──
      - name: knowledge-ingestion
        run: |
          python -m unittest discover -s services/knowledge-service/tests -p '*_test.py' -v 2>/dev/null \
            || echo "knowledge-service tests: no test files found"
          if [ -f tools/benchmark_knowledge.py ]; then
            python tools/benchmark_knowledge.py --root .
          else
            echo "knowledge benchmark: skipped, tools/benchmark_knowledge.py not present"
          fi
        env:
          PYTHONPATH: ${{ github.workspace }}
