version: 1
plan:
  name: 'N2B-3 Fixup-B：补 4 NPC portrait + sprite'
  max_concurrency: 1
  max_consecutive_failures: 2
  max_cycles: 5

tasks:
  - id: n2b3-fixup-b-assets
    title: '生成 4 NPC portrait + sprite'
    prompt: |
      项目根目录：/Users/kevinzzz/Documents/database/gaokao-agent/game/metacampus-godot

      目标：为 4 个 NPC 补全 portrait × 4 + sprite_idle，共 20 张 PNG。

      Target NPCs:
      - compliance_officer
      - homeroom_teacher
      - it_operator
      - logistics_manager

      每个 NPC 需生成 5 张 PNG：
      - portrait_neutral.png（256×256 RGBA）
      - portrait_happy.png（256×256 RGBA）
      - portrait_worried.png（256×256 RGBA）
      - portrait_strict.png（256×256 RGBA）
      - sprite_idle.png（64×64 RGBA）

      输入：
      - docs/npc-palette-guide-v1.md（色板）
      - docs/npc-style-bible.md（风格规范）
      - data/npcs/npc_<id>.json（人物设定）
      - 现有 assets/npcs/<npc_id>/baseline/walk_*.png（身份一致性参考）

      输出路径：
      - assets/npcs/compliance_officer/baseline/portrait_*.png
      - assets/npcs/compliance_officer/baseline/sprite_idle.png
      - ... 同理其他 3 NPC

      技术要求：
      1. 用 matrix_generate_image 生成 1:1 JPEG（portrait），sips 转为 PNG 并缩至 256×256
      2. sprite_idle：生成 1:1 JPEG → sips 转 PNG 64×64
      3. 所有 PNG 需透明背景（RGBA color_type=6）
      4. 幂等：已存在的文件跳过，不重复生成
      5. 完成后用 Python struct 验证所有 20 张 PNG：尺寸正确 + RGBA
      6. 更新 generation_metadata.json

      美术规范：
      - warm campus 风格，禁止暗黑复古/Stardew/fantasy
      - 身份与现有 walk sheet 一致（穿校服/职业装）
      - 4 个 NPC 角色定位：
        * compliance_officer：严肃职场女性，蓝色/灰色调
        * homeroom_teacher：温和教师，暖色调
        * it_operator：年轻技术男，蓝绿/灰色调
        * logistics_manager：干练中年管理，藏蓝/灰色调

      交付：20 张 PNG + 验证报告 + 更新后的 generation_metadata.json
    assigned_to: pixel-artist
    verified_by: verifier
    verify_prompt: |
      独立验证 20 张 PNG：
      1. 对 4 个 NPC 的每个 portrait_neutral/happy/worried/strict（16 张）验证 256×256 RGBA
      2. 对 4 个 sprite_idle 验证 64×64 RGBA
      3. 用 Python struct 解析 PNG IHDR，不依赖 PIL
      4. 验证透明背景（color_type=6，非白底）
      5. 报告：20/20 通过 或 具体失败项
    timeout_ms: 1800000
    max_retries: 1
    depends_on: []
    gates: []

  - id: n2b3-fixup-b-report
    title: 'Fixup-B 最终报告'
    prompt: |
      项目根目录：/Users/kevinzzz/Documents/database/gaokao-agent/game/metacampus-godot

      目标：写入 reports/n2b3-fixup-b-validation.md

      报告内容：
      1. 缺口清单：4 NPC × 5 项 = 20 PNG
      2. 验证结果：20/20 通过（或具体失败项）
      3. 规格确认：portrait 256×256 RGBA、sprite_idle 64×64 RGBA、透明背景
      4. walk sheet 未被覆盖
      5. 美术风格确认
      6. 更新 N2B-3 全量报告引用

      更新 archives/npc-assets-n2b3-20260529/ 中的 reports/ 目录（如有变动）
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证报告完整性：
      1. 报告明确列出 20 项缺失资产已补全
      2. 每项有尺寸/格式验证结果
      3. 确认 walk sheet 未被修改
      4. 报告语言与 N2B-3 原有报告风格一致
    timeout_ms: 300000
    depends_on: [n2b3-fixup-b-assets]
    gates: []
