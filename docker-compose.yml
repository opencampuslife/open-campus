services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gaokao-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gaokao_agent_test
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gaokao_agent_test"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - gaokao-agent-pgdata:/var/lib/postgresql/data

volumes:
  gaokao-agent-pgdata:
