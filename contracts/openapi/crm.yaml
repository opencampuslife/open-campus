    "/api/sales/sessions/{session_id}/followup": {"parameters": [{"$ref": "#/components/parameters/SessionId"}], "post": {"responses": {"default": {"$ref": "#/components/responses/LegacyResponse"}}}},
    "/api/sales/leads": {"get": {"responses": {"default": {"$ref": "#/components/responses/LegacyResponse"}}}},
    "/api/crm/leads": {
      "get": {"responses": {"default": {"$ref": "#/components/responses/LegacyResponse"}}},
      "post": {"responses": {"default": {"$ref": "#/components/responses/LegacyResponse"}}}
