services:
  go-shadow-gateway:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: gaokao-agent-go-shadow
    environment:
      LISTEN_ADDR: ":8788"
      ROUTES_CONTRACT_PATH: "/app/contracts/routes.yaml"
      PYTHON_GATEWAY_BASE_URL: "${PYTHON_GATEWAY_BASE_URL:-http://host.docker.internal:8787}"
      SHADOW_MODE: "true"
      SHADOW_PROXY_ENABLED: "${SHADOW_PROXY_ENABLED:-false}"
      SHADOW_PROXY_ROUTES: "${SHADOW_PROXY_ROUTES:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      REQUEST_TIMEOUT_MS: "${REQUEST_TIMEOUT_MS:-5000}"
      BODY_LIMIT_BYTES: "${BODY_LIMIT_BYTES:-10485760}"
    ports:
      - "${SHADOW_PORT:-8788}:8788"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
