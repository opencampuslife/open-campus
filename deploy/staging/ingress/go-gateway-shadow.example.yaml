mode: staging_only
enabled: false
description: "Go shadow gateway staging ingress config; disabled by default, weight=0, explicit allowlist only"
default_weight: 0

canary:
  type: header
  enabled: false
  header: X-Gaokao-Gateway-Canary
  value: go

upstreams:
  go_gateway:
    url: "http://go-shadow-gateway:8788"
    description: "Go shadow gateway (staging, disabled by default)"
  python_gateway:
    url: "http://api-gateway:8787"
    description: "Python legacy gateway (fallback)"

routes:
  - method: POST
    path: /api/gaokao/chat
    route_to: go_gateway
    enabled: false
    weight: 0
    canary:
      type: header
      header: X-Gaokao-Gateway-Canary
      value: go
    notes: "Public chat route; cutover_policy.yaml allowlist"

  - method: POST
    path: /api/admin/ingestion/runs/{run_id}/cancel
    route_to: go_gateway
    enabled: false
    weight: 0
    canary:
      type: header
      header: X-Gaokao-Gateway-Canary
      value: go
    notes: "Admin ingest; cutover_policy.yaml allowlist"

  - method: POST
    path: /api/admin/staging/docs/{doc_id}/validate
    route_to: go_gateway
    enabled: false
    weight: 0
    canary:
      type: header
      header: X-Gaokao-Gateway-Canary
      value: go
    notes: "Admin staging; cutover_policy.yaml allowlist"

  - method: POST
    path: /api/admin/staging/docs/{doc_id}/approve
    route_to: go_gateway
    enabled: false
    weight: 0
    canary:
      type: header
      header: X-Gaokao-Gateway-Canary
      value: go
    notes: "Admin staging; cutover_policy.yaml allowlist"

  - method: POST
    path: /api/admin/staging/docs/{doc_id}/reject
    route_to: go_gateway
    enabled: false
    weight: 0
    canary:
      type: header
      header: X-Gaokao-Gateway-Canary
      value: go
    notes: "Admin staging; cutover_policy.yaml allowlist"

  - method: POST
    path: /api/admin/staging/docs/{doc_id}/publish
    route_to: go_gateway
    enabled: false
    weight: 0
    canary:
      type: header
      header: X-Gaokao-Gateway-Canary
      value: go
    notes: "Admin staging; cutover_policy.yaml allowlist"

blocked_patterns:
  - method: GET
    path_pattern: /api/admin/**
    reason: "deprecated compatibility alias or non-canonical admin mutation"
  - method: "*"
    path_pattern: /api/admin/**
    reason: "wildcard admin cutover is forbidden; allow if explicitly listed"
    allow_if_explicitly_listed: true
  - method: "*"
    path_pattern: /api/*
    reason: "wildcard /api/* is forbidden"
    allow_if_explicitly_listed: false
